name: Deploy staging

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/deploy-staging.yml"
      - ".github/scripts/**"

permissions:
  id-token: write
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: cloud-dash/crudapp-platform/api
  ECS_CLUSTER: cloud-dash-crudapp-platform-staging-ecs-cluster
  ECS_SERVICE: cloud-dash-crudapp-platform-staging-api-service
  ECS_TASK_FAMILY: cloud-dash-crudapp-platform-staging-api
  CONTAINER_NAME: api
  APP_URL: https://staging.awsclouddash.click
  FARGATE_PLATFORM_VERSION: "1.4.0"

jobs:
  deploy:
    name: Build, migrate, and deploy staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: app
        run: |
          python -m pytest -q

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: crudapp-staging-deploy

      - name: Confirm AWS identity
        run: |
          aws sts get-caller-identity

      - name: Build and push Docker image to ECR
        id: image
        shell: bash
        run: |
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_TAG="main-${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "Image URI: ${IMAGE_URI}"

          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

          docker build --pull -t "${IMAGE_URI}" ./app
          docker push "${IMAGE_URI}"

          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Register new ECS task definition
        id: taskdef
        shell: bash
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_FAMILY}" \
            --query taskDefinition \
            --output json > task-definition.json

          python .github/scripts/render-ecs-task-definition.py \
            task-definition.json \
            new-task-definition.json \
            "${CONTAINER_NAME}" \
            "${{ steps.image.outputs.image_uri }}"

          NEW_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          echo "New task definition: ${NEW_TASK_DEF_ARN}"
          echo "task_definition_arn=${NEW_TASK_DEF_ARN}" >> "${GITHUB_OUTPUT}"

      - name: Write ECS network configuration from existing service
        shell: bash
        run: |
          set -euo pipefail

          aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --query 'services[0].networkConfiguration' \
            --output json > service-network.json

          python .github/scripts/write-ecs-network-config.py \
            service-network.json \
            ecs-network-config.json

          cat ecs-network-config.json

      - name: Run Alembic migration task
        shell: bash
        run: |
          set -euo pipefail

          OVERRIDES='{
            "containerOverrides": [
              {
                "name": "api",
                "command": [
                  "python",
                  "-m",
                  "alembic",
                  "-c",
                  "app/alembic.ini",
                  "upgrade",
                  "head"
                ]
              }
            ]
          }'

          MIGRATION_TASK_ARN="$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --launch-type FARGATE \
            --platform-version "${FARGATE_PLATFORM_VERSION}" \
            --task-definition "${{ steps.taskdef.outputs.task_definition_arn }}" \
            --network-configuration file://ecs-network-config.json \
            --overrides "${OVERRIDES}" \
            --query 'tasks[0].taskArn' \
            --output text)"

          echo "Migration task ARN: ${MIGRATION_TASK_ARN}"

          aws ecs wait tasks-stopped \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${MIGRATION_TASK_ARN}"

          EXIT_CODE="$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${MIGRATION_TASK_ARN}" \
            --query "tasks[0].containers[?name=='api'].exitCode | [0]" \
            --output text)"

          STOP_REASON="$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${MIGRATION_TASK_ARN}" \
            --query "tasks[0].stoppedReason" \
            --output text)"

          echo "Migration exit code: ${EXIT_CODE}"
          echo "Migration stop reason: ${STOP_REASON}"

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Migration failed."
            aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER}" \
              --tasks "${MIGRATION_TASK_ARN}" \
              --output json
            exit 1
          fi

      - name: Update ECS service
        shell: bash
        run: |
          set -euo pipefail

          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${{ steps.taskdef.outputs.task_definition_arn }}" \
            --desired-count 1

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"

      - name: Confirm ECS task is still private
        shell: bash
        run: |
          set -euo pipefail

          TASK_ARN="$(aws ecs list-tasks \
            --cluster "${ECS_CLUSTER}" \
            --service-name "${ECS_SERVICE}" \
            --desired-status RUNNING \
            --query 'taskArns[0]' \
            --output text)"

          echo "Running task: ${TASK_ARN}"

          ENI_ID="$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value | [0]" \
            --output text)"

          echo "Task ENI: ${ENI_ID}"

          PUBLIC_IP="$(aws ec2 describe-network-interfaces \
            --network-interface-ids "${ENI_ID}" \
            --query "NetworkInterfaces[0].Association.PublicIp" \
            --output text)"

          echo "Public IP: ${PUBLIC_IP}"

          if [ "${PUBLIC_IP}" != "None" ] && [ "${PUBLIC_IP}" != "" ]; then
            echo "Unexpected public IP found on ECS task."
            exit 1
          fi

      - name: Smoke test public HTTPS API
        shell: bash
        run: |
          set -euo pipefail

          curl -fsS "${APP_URL}/health/live"
          echo

          curl -fsS "${APP_URL}/health/ready"
          echo

          ITEM_ID="$(curl -fsS \
            -X POST "${APP_URL}/items/" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"CI deploy item ${GITHUB_RUN_NUMBER}\",\"description\":\"Created by GitHub Actions staging deploy\",\"is_active\":true}" \
            | python -c "import json,sys; print(json.load(sys.stdin)['id'])")"

          echo "Created item ID: ${ITEM_ID}"

          curl -fsS "${APP_URL}/items/${ITEM_ID}"
          echo

          curl -fsS \
            -X DELETE "${APP_URL}/items/${ITEM_ID}" \
            -o /dev/null

          echo "Smoke test completed successfully."